<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No sueltes lo efímero - Bandcamp</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.css">
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.js"></script>

    <style>
        :root { --bc-blue: #1da0c3; --bc-dark: #222; --bg-gray: #f4f7f6; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: var(--bg-gray); color: var(--bc-dark); padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--bc-dark); margin-bottom: 5px; }
        
        /* Stats Grid */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0; color: #888; font-size: 0.75rem; text-transform: uppercase; }
        .card p { font-size: 1.8rem; margin: 8px 0 0; font-weight: 800; color: var(--bc-blue); }

        /* Sections */
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { font-size: 1.2rem; margin-top: 0; border-left: 4px solid var(--bc-blue); padding-left: 12px; }
        
        canvas { max-height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>No sueltes lo efímero Pumuky</h1>
        <p>Pedidos en Pre venta a traves de Bandcamp</p>
    </div>

    <div class="grid-stats">
        <div class="card"><h3>Total Pedidos</h3><p id="stat-total">0</p></div>
        <div class="card"><h3>Ingresos Totales</h3><p id="stat-revenue">0 €</p></div>
        <div class="card"><h3>Ticket Promedio</h3><p id="stat-avg">0 €</p></div>
        <div class="card"><h3>Venta Máxima</h3><p id="stat-max">0 €</p></div>
    </div>

    <div class="section">
        <h2>Distribución de Precios</h2>
        <canvas id="ventasChart"></canvas>
    </div>

    <div class="section">
        <h2>Listado Maestro de Ventas</h2>
        <table id="tablaVentas" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Subtotal</th>
                    <th>Ciudad</th>
                    <th>CP</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script src="datos.js"></script>

<script>
    // 1. Fallback por si datos.js falla o está vacío
    const data = (typeof datosBandcamp !== 'undefined') ? datosBandcamp : [];

    // 2. Cálculo de estadísticas para los Cards
    function updateStats(items) {
        if (items.length === 0) return;
        const subtotals = items.map(i => i.subtotal);
        const totalSum = subtotals.reduce((a, b) => a + b, 0);
        
        document.getElementById('stat-total').innerText = items.length;
        document.getElementById('stat-revenue').innerText = totalSum.toLocaleString() + ' €';
        document.getElementById('stat-avg').innerText = (totalSum / items.length).toFixed(2) + ' €';
        document.getElementById('stat-max').innerText = Math.max(...subtotals).toFixed(2) + ' €';
    }

    // 3. Procesamiento de rangos para Chart.js
    function getRangeData(items) {
        let counts = [0, 0, 0, 0, 0, 0];
        items.forEach(item => {
            const v = item.subtotal;
            if (v < 5) counts[0]++;
            else if (v < 10) counts[1]++;
            else if (v < 15) counts[2]++;
            else if (v < 20) counts[3]++;
            else if (v < 30) counts[4]++;
            else counts[5]++;
        });
        return counts;
    }

    $(document).ready(function() {
        updateStats(data);

        // Inicializar Gráfico
        const ctx = document.getElementById('ventasChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['<5€', '5-10€', '10-15€', '15-20€', '20-30€', '30€+'],
                datasets: [{
                    label: 'Cantidad de Pedidos',
                    data: getRangeData(data),
                    backgroundColor: '#1da0c3',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Inicializar DataTable
        $('#tablaVentas').DataTable({
            data: data,
            columns: [
                { data: 'fecha' },
                { data: 'subtotal', render: $.fn.dataTable.render.number('.', ',', 2, '', ' €') },
                { data: 'ciudad' },
                { data: 'cp' }
            ],
            language: { url: "//cdn.datatables.net/plug-ins/1.10.25/i18n/Spanish.json" },
            order: [[0, 'desc']], // Ordenar por fecha por defecto
            pageLength: 5
        });
    });
</script>
</body>
</html>
