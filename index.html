<script src="datos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Ahora las gráficas se alimentan de la variable 'datosBandcamp'
    const ctx = document.getElementById('ventasChart').getContext('2d');
    
    // Función para procesar los rangos automáticamente desde los datos reales
    const procesarRangos = () => {
        let rangos = [0, 0, 0, 0, 0, 0]; // Contadores para los rangos
        datosBandcamp.forEach(item => {
            if (item.subtotal < 1) rangos[0]++;
            else if (item.subtotal < 7) rangos[1]++;
            else if (item.subtotal < 15) rangos[2]++;
            else if (item.subtotal < 20) rangos[3]++;
            else if (item.subtotal < 25) rangos[4]++;
            else rangos[5]++;
        });
        return rangos;
    };

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['<1€', '1-7€', '7-15€', '15-20€', '20-25€', '25€+'],
            datasets: [{
                label: 'Ventas Reales',
                data: procesarRangos(), // ¡Datos dinámicos!
                backgroundColor: '#3a86ff'
            }]
        }
    });

    // Vincular la tabla DataTables automáticamente
    $(document).ready( function () {
        $('#tablaVentas').DataTable({
            data: datosBandcamp,
            columns: [
                { data: 'fecha' },
                { data: 'subtotal', render: $.fn.dataTable.render.number('.', ',', 2, '', ' €') },
                { data: 'ciudad' },
                { data: 'cp' }
            ],
            language: { url: "//cdn.datatables.net/plug-ins/1.10.25/i18n/Spanish.json" }
        });
    });
</script>
