<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Ventas - Bandcamp</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #333; }
        
        /* Tarjetas de métricas */
        .stats-container { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        .card h3 { margin: 0; color: #777; font-size: 0.9em; text-transform: uppercase; }
        .card p { font-size: 1.8em; font-weight: bold; margin: 10px 0 0; color: #2c3e50; }
        .card.highlight { border-top: 5px solid #3a86ff; }

        /* Contenedor del gráfico */
        .chart-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Ventas Bandcamp</h1>

    <div class="stats-container">
        <div class="card highlight">
            <h3>Promedio</h3>
            <p>16,16 €</p>
        </div>
        <div class="card highlight">
            <h3>Mediana</h3>
            <p>15,00 €</p>
        </div>
        <div class="card highlight">
            <h3>Moda</h3>
            <p>20,00 €</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="ventasChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('ventasChart').getContext('2d');
    const ventasChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['0.5', '1-7', '7.01-9.99', '10-14.99', '15-19.99', '20-24.99', '25-29.99', '30+'],
            datasets: [{
                label: 'Número de Artículos',
                data: [6, 34, 3, 23, 38, 36, 17, 10], // Datos basados en tu archivo
                backgroundColor: 'rgba(58, 134, 255, 0.7)',
                borderColor: 'rgba(58, 134, 255, 1)',
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                title: { display: true, text: 'Distribución de Pedidos por Rango de Precio' }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: '#eee' } },
                x: { grid: { display: false } }
            }
        }
    });
</script>

</body>
</html>
